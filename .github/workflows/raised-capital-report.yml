name: Raised Capital Daily Report

on:
  schedule:
    # 8:00 AM Spain (UTC+2 verano = 6:00 UTC / UTC+1 invierno = 7:00 UTC)
    # Usamos 6:00 UTC para cubrir horario de verano
    - cron: '0 6 * * *'
  workflow_dispatch: # permite lanzarlo manualmente desde GitHub

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch data & send email
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
          MORALIS_KEY: ${{ secrets.MORALIS_KEY }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: |
          node << 'EOF'
          const https = require('https');

          const MORALIS_KEY = process.env.MORALIS_KEY;
          const SHEET_CSV_URL = process.env.SHEET_CSV_URL;
          const BREVO_KEY = process.env.BREVO_API_KEY;
          const EUR_USD = 1.1855;

          const SAFES = [
            { address: '0x7FB1e8a839B81C9Ae4CebAd6f259106d77eD83D2', name: 'CME-1' },
            { address: '0x17BF9A5bF74181AaB6CbB7EC80e16B7F1bFDF5a7', name: 'RET-2' },
            { address: '0x7590219fDAFcC4e48c8c4E9178722d916d7EE305', name: 'SLA-3' },
            { address: '0x8823eed2A3644edC49abd6628c777bFC3f4243F0', name: 'GRX-4' },
            { address: '0xba9759D878c0Ff656f1C1d9670F4736E162F61AF', name: 'LVT-2' },
          ];

          const BUDGET_2026 = [
            { mes: 'Ene', goal: 2500000 },
            { mes: 'Feb', goal: 3773000 },
            { mes: 'Mar', goal: 4045000 },
            { mes: 'Abr', goal: 4318000 },
            { mes: 'May', goal: 4591000 },
            { mes: 'Jun', goal: 4864000 },
            { mes: 'Jul', goal: 5136000 },
            { mes: 'Ago', goal: 5409000 },
            { mes: 'Sep', goal: 5682000 },
            { mes: 'Oct', goal: 5955000 },
            { mes: 'Nov', goal: 6227000 },
            { mes: 'Dic', goal: 6500000 },
          ];

          const USDT = '0xc2132D05D31c914a87C6611C10748AEb04B58e8F';

          function fmt(n) {
            return '$' + parseFloat(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          }

          function fetchJson(url, options = {}) {
            return new Promise((resolve, reject) => {
              const req = https.request(url, options, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { resolve(data); }
                });
              });
              req.on('error', reject);
              if (options.body) req.write(options.body);
              req.end();
            });
          }

          async function getBalance(address) {
            try {
              const data = await fetchJson(
                `https://deep-index.moralis.io/api/v2.2/${address}/erc20?chain=0x89`,
                { headers: { 'accept': 'application/json', 'X-API-Key': MORALIS_KEY } }
              );
              if (!Array.isArray(data)) return 0;
              const token = data.find(t => t.token_address?.toLowerCase() === USDT.toLowerCase());
              return token ? parseInt(token.balance) / Math.pow(10, token.decimals) : 0;
            } catch { return 0; }
          }

          async function getTransfersTotal(address) {
            try {
              let total = 0, count = 0, cursor = null, pages = 0;
              while (pages < 20) {
                const url = `https://deep-index.moralis.io/api/v2.2/${address}/erc20/transfers?chain=0x89&contract_addresses[]=${USDT}&limit=100${cursor ? '&cursor=' + cursor : ''}`;
                const data = await fetchJson(url, { headers: { 'accept': 'application/json', 'X-API-Key': MORALIS_KEY } });
                if (!data.result?.length) break;
                data.result
                  .filter(tx => tx.to_address?.toLowerCase() === address.toLowerCase())
                  .forEach(tx => { total += parseInt(tx.value) / 1e6; count++; });
                cursor = data.cursor; pages++;
                if (!cursor) break;
                await new Promise(r => setTimeout(r, 150));
              }
              return { total, count };
            } catch { return { total: 0, count: 0 }; }
          }

          function httpsGetFollowRedirects(url, maxRedirects = 5) {
            return new Promise((resolve, reject) => {
              const urlObj = new URL(url);
              const options = { hostname: urlObj.hostname, path: urlObj.pathname + urlObj.search, method: 'GET', headers: { 'User-Agent': 'Mozilla/5.0' } };
              const req = https.request(options, res => {
                if ((res.statusCode === 301 || res.statusCode === 302 || res.statusCode === 307 || res.statusCode === 308) && res.headers.location && maxRedirects > 0) {
                  resolve(httpsGetFollowRedirects(res.headers.location, maxRedirects - 1));
                  return;
                }
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => resolve(data));
              });
              req.on('error', reject);
              req.end();
            });
          }

          async function fetchFiat() {
            try {
              const res = await httpsGetFollowRedirects(SHEET_CSV_URL);
              const lines = res.trim().split('\n');
              const COL = { fecha: 4, proyecto: 5, importeEur: 8, usd: 11, estado: 13 };
              const SAFE_NAMES = SAFES.map(s => s.name);
              const result = {};

              const parseNum = str => {
                const s = (str || '').replace(/"/g, '').trim();
                if (!s) return 0;
                if (s.includes(',') && s.includes('.'))
                  return s.indexOf('.') < s.indexOf(',')
                    ? parseFloat(s.replace(/\./g, '').replace(',', '.'))
                    : parseFloat(s.replace(/,/g, ''));
                if (s.includes(',')) return parseFloat(s.replace(',', '.'));
                return parseFloat(s) || 0;
              };

              for (let i = 1; i < lines.length; i++) {
                const cols = []; let cur = '', inQ = false;
                for (const ch of lines[i] + ',') {
                  if (ch === '"') inQ = !inQ;
                  else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
                  else cur += ch;
                }
                const clean = idx => (cols[idx] || '').replace(/"/g, '').trim();
                const proyecto = clean(COL.proyecto);
                if (!SAFE_NAMES.includes(proyecto)) continue;
                const estado = clean(COL.estado).toLowerCase();
                if (estado === 'devuelto' || estado === 'devuelta') continue;
                const importeEur = parseNum(clean(COL.importeEur));
                const usd = parseNum(clean(COL.usd));
                const fecha = clean(COL.fecha);
                if (!result[proyecto]) result[proyecto] = { totalEur: 0, totalUsd: 0, count: 0, byMonth: {} };
                result[proyecto].totalEur += importeEur;
                result[proyecto].totalUsd += usd;
                result[proyecto].count++;
                // Desglose mensual para budget
                if (fecha) {
                  const f = String(fecha);
                  let yr, mo;
                  if (f.includes('/')) { const p = f.split('/'); yr = p[2]; mo = parseInt(p[1]); }
                  else { yr = f.slice(0,4); mo = parseInt(f.slice(5,7)); }
                  if (yr === '2026' && mo >= 1 && mo <= 12) {
                    result[proyecto].byMonth[mo] = (result[proyecto].byMonth[mo] || 0) + importeEur * EUR_USD;
                  }
                }
              }
              return result;
            } catch(e) { console.error('Sheet error:', e.message); return {}; }
          }

          async function main() {
            console.log('Fetching fiat data...');
            const fiatData = await fetchFiat();

            console.log('Fetching blockchain data...');
            let totalCripto = 0, totalCriptoTxs = 0;
            const safeRows = [];
            const mCripto = new Array(13).fill(0);

            for (const safe of SAFES) {
              const [balance, { total, count }] = await Promise.all([
                getBalance(safe.address),
                getTransfersTotal(safe.address)
              ]);
              const fiat = fiatData[safe.name] || { totalEur: 0, totalUsd: 0, count: 0 };
              totalCripto += total;
              totalCriptoTxs += count;
              safeRows.push({ name: safe.name, fiatUsd: fiat.totalUsd, fiatEur: fiat.totalEur, cripto: total, total: fiat.totalUsd + total, inversores: fiat.count });
            }

            // Fiat totals
            const totalFiatUsd = safeRows.reduce((s, r) => s + r.fiatUsd, 0);
            const totalFiatEur = safeRows.reduce((s, r) => s + r.fiatEur, 0);
            const totalInversores = safeRows.reduce((s, r) => s + r.inversores, 0);
            const totalCapital = totalFiatUsd + totalCripto;

            // Budget 2026
            const mFiat = new Array(13).fill(0);
            Object.values(fiatData).forEach(sf => {
              Object.entries(sf.byMonth || {}).forEach(([mo, usd]) => { mFiat[parseInt(mo)] += usd; });
            });

            const nowMo = new Date().getMonth(); // 0-based
            let ytdGoal = 0, ytdReal = 0;
            const budgetRows = BUDGET_2026.map((b, i) => {
              const mo = i + 1;
              const real = mFiat[mo] + mCripto[mo];
              const hasPassed = i <= nowMo;
              if (hasPassed) { ytdGoal += b.goal; ytdReal += real; }
              const pct = hasPassed && b.goal > 0 ? (real / b.goal * 100).toFixed(1) : null;
              const gap = hasPassed ? b.goal - real : null;
              return { mes: b.mes, goal: b.goal, real: hasPassed ? real : null, pct, gap, onTrack: hasPassed && real >= b.goal };
            });

            const ytdPct = ytdGoal > 0 ? (ytdReal / ytdGoal * 100) : 0;
            const ytdGap = ytdGoal - ytdReal;

            // Build HTML email
            const today = new Date().toLocaleDateString('es-ES', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

            const safeRowsHtml = safeRows.map(r => `
              <tr>
                <td style="padding:10px 14px;border-bottom:1px solid #1e293b;color:#f1f5f9;font-weight:600;">${r.name}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #1e293b;color:#818cf8;text-align:right;">${fmt(r.fiatUsd)}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #1e293b;color:#fb923c;text-align:right;">${fmt(r.cripto)}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #1e293b;color:#00d4aa;font-weight:700;text-align:right;">${fmt(r.total)}</td>
                <td style="padding:10px 14px;border-bottom:1px solid #1e293b;color:#94a3b8;text-align:right;">${r.inversores}</td>
              </tr>
            `).join('');

            const budgetRowsHtml = budgetRows.filter(r => r.real !== null).map(r => `
              <tr>
                <td style="padding:8px 12px;border-bottom:1px solid #1e293b;color:#f1f5f9;">${r.mes}</td>
                <td style="padding:8px 12px;border-bottom:1px solid #1e293b;color:#818cf8;text-align:right;">${fmt(r.goal)}</td>
                <td style="padding:8px 12px;border-bottom:1px solid #1e293b;color:#00d4aa;font-weight:700;text-align:right;">${fmt(r.real)}</td>
                <td style="padding:8px 12px;border-bottom:1px solid #1e293b;text-align:right;">
                  <span style="color:${parseFloat(r.pct)>=100?'#00d4aa':parseFloat(r.pct)>=80?'#fb923c':'#ef4444'};font-weight:700;">${r.pct}%</span>
                </td>
                <td style="padding:8px 12px;border-bottom:1px solid #1e293b;color:${r.gap<=0?'#00d4aa':'#f472b6'};text-align:right;">
                  ${r.gap<=0?'+':'-'}${fmt(Math.abs(r.gap))}
                </td>
                <td style="padding:8px 12px;border-bottom:1px solid #1e293b;text-align:right;">
                  ${r.onTrack?'<span style="color:#00d4aa;">✅ On track</span>':'<span style="color:#fb923c;">⚠️ Below</span>'}
                </td>
              </tr>
            `).join('');

            const html = `
            <!DOCTYPE html>
            <html>
            <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
            <body style="margin:0;padding:0;background:#0f172a;font-family:monospace;">
              <div style="max-width:700px;margin:0 auto;padding:32px 16px;">

                <!-- Header -->
                <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px 28px;margin-bottom:20px;">
                  <div style="font-size:1.3em;font-weight:700;color:#f1f5f9;margin-bottom:4px;">📊 Raised Capital — Reporte Diario</div>
                  <div style="font-size:0.85em;color:#64748b;text-transform:capitalize;">${today}</div>
                </div>

                <!-- KPIs consolidado -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
                  <table width="100%" style="border-collapse:collapse;">
                    <tr>
                      <td style="padding:0 6px 12px 0;">
                        <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;border-left:4px solid #00d4aa;padding:16px 20px;">
                          <div style="font-size:0.72em;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Capital Total</div>
                          <div style="font-size:1.6em;font-weight:700;color:#00d4aa;">${fmt(totalCapital)}</div>
                          <div style="font-size:0.72em;color:#475569;margin-top:4px;">Fiat + Cripto</div>
                        </div>
                      </td>
                      <td style="padding:0 0 12px 6px;">
                        <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;border-left:4px solid #818cf8;padding:16px 20px;">
                          <div style="font-size:0.72em;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Fiat Captado</div>
                          <div style="font-size:1.6em;font-weight:700;color:#818cf8;">${fmt(totalFiatUsd)}</div>
                          <div style="font-size:0.72em;color:#475569;margin-top:4px;">€${totalFiatEur.toLocaleString('es-ES',{maximumFractionDigits:0})}</div>
                        </div>
                      </td>
                    </tr>
                    <tr>
                      <td style="padding:0 6px 0 0;">
                        <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;border-left:4px solid #fb923c;padding:16px 20px;">
                          <div style="font-size:0.72em;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Cripto USDT</div>
                          <div style="font-size:1.6em;font-weight:700;color:#fb923c;">${fmt(totalCripto)}</div>
                          <div style="font-size:0.72em;color:#475569;margin-top:4px;">${totalCriptoTxs} transacciones</div>
                        </div>
                      </td>
                      <td style="padding:0 0 0 6px;">
                        <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;border-left:4px solid #f472b6;padding:16px 20px;">
                          <div style="font-size:0.72em;color:#64748b;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Total Inversores</div>
                          <div style="font-size:1.6em;font-weight:700;color:#f472b6;">${totalInversores.toLocaleString()}</div>
                          <div style="font-size:0.72em;color:#475569;margin-top:4px;">${SAFES.length} safes activos</div>
                        </div>
                      </td>
                    </tr>
                  </table>
                </div>

                <!-- Budget YTD -->
                <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px 24px;margin-bottom:20px;">
                  <div style="font-size:0.8em;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;">🎯 Budget 2026 — YTD</div>
                  <table width="100%" style="border-collapse:collapse;">
                    <tr>
                      <td width="25%" style="padding:0 8px 12px 0;">
                        <div style="background:#0f172a;border-radius:8px;padding:12px;border-left:3px solid #00d4aa;">
                          <div style="font-size:0.7em;color:#64748b;text-transform:uppercase;margin-bottom:4px;">Real YTD</div>
                          <div style="font-size:1.2em;font-weight:700;color:#00d4aa;">${fmt(ytdReal)}</div>
                        </div>
                      </td>
                      <td width="25%" style="padding:0 8px 12px;">
                        <div style="background:#0f172a;border-radius:8px;padding:12px;border-left:3px solid #818cf8;">
                          <div style="font-size:0.7em;color:#64748b;text-transform:uppercase;margin-bottom:4px;">Goal YTD</div>
                          <div style="font-size:1.2em;font-weight:700;color:#818cf8;">${fmt(ytdGoal)}</div>
                        </div>
                      </td>
                      <td width="25%" style="padding:0 8px 12px;">
                        <div style="background:#0f172a;border-radius:8px;padding:12px;border-left:3px solid ${ytdPct>=100?'#00d4aa':ytdPct>=80?'#fb923c':'#ef4444'};">
                          <div style="font-size:0.7em;color:#64748b;text-transform:uppercase;margin-bottom:4px;">% Cumpl.</div>
                          <div style="font-size:1.2em;font-weight:700;color:${ytdPct>=100?'#00d4aa':ytdPct>=80?'#fb923c':'#ef4444'};">${ytdPct.toFixed(1)}%</div>
                        </div>
                      </td>
                      <td width="25%" style="padding:0 0 12px 8px;">
                        <div style="background:#0f172a;border-radius:8px;padding:12px;border-left:3px solid ${ytdGap<=0?'#00d4aa':'#f472b6'};">
                          <div style="font-size:0.7em;color:#64748b;text-transform:uppercase;margin-bottom:4px;">Gap YTD</div>
                          <div style="font-size:1.2em;font-weight:700;color:${ytdGap<=0?'#00d4aa':'#f472b6'};">${ytdGap<=0?'+':'-'}${fmt(Math.abs(ytdGap))}</div>
                        </div>
                      </td>
                    </tr>
                  </table>

                  <!-- Budget tabla mensual -->
                  <table width="100%" style="border-collapse:collapse;font-size:0.82em;margin-top:8px;">
                    <thead>
                      <tr style="color:#475569;font-size:0.8em;text-transform:uppercase;">
                        <th style="padding:7px 12px;text-align:left;border-bottom:1px solid #334155;">Mes</th>
                        <th style="padding:7px 12px;text-align:right;border-bottom:1px solid #334155;">Goal</th>
                        <th style="padding:7px 12px;text-align:right;border-bottom:1px solid #334155;">Real</th>
                        <th style="padding:7px 12px;text-align:right;border-bottom:1px solid #334155;">%</th>
                        <th style="padding:7px 12px;text-align:right;border-bottom:1px solid #334155;">Gap</th>
                        <th style="padding:7px 12px;text-align:right;border-bottom:1px solid #334155;">Estado</th>
                      </tr>
                    </thead>
                    <tbody>${budgetRowsHtml}</tbody>
                  </table>
                </div>

                <!-- Detalle por safe -->
                <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px 24px;margin-bottom:20px;">
                  <div style="font-size:0.8em;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;">📋 Detalle por Safe</div>
                  <table width="100%" style="border-collapse:collapse;font-size:0.82em;">
                    <thead>
                      <tr style="color:#475569;font-size:0.8em;text-transform:uppercase;">
                        <th style="padding:7px 14px;text-align:left;border-bottom:1px solid #334155;">Safe</th>
                        <th style="padding:7px 14px;text-align:right;border-bottom:1px solid #334155;">Fiat USD</th>
                        <th style="padding:7px 14px;text-align:right;border-bottom:1px solid #334155;">Cripto</th>
                        <th style="padding:7px 14px;text-align:right;border-bottom:1px solid #334155;">Total</th>
                        <th style="padding:7px 14px;text-align:right;border-bottom:1px solid #334155;">Inv.</th>
                      </tr>
                    </thead>
                    <tbody>${safeRowsHtml}</tbody>
                    <tfoot>
                      <tr style="background:#0f172a;">
                        <td style="padding:10px 14px;color:#f1f5f9;font-weight:700;">TOTAL</td>
                        <td style="padding:10px 14px;color:#818cf8;font-weight:700;text-align:right;">${fmt(totalFiatUsd)}</td>
                        <td style="padding:10px 14px;color:#fb923c;font-weight:700;text-align:right;">${fmt(totalCripto)}</td>
                        <td style="padding:10px 14px;color:#00d4aa;font-weight:700;text-align:right;">${fmt(totalCapital)}</td>
                        <td style="padding:10px 14px;color:#94a3b8;font-weight:700;text-align:right;">${totalInversores}</td>
                      </tr>
                    </tfoot>
                  </table>
                </div>

                <!-- Footer -->
                <div style="text-align:center;color:#334155;font-size:0.72em;padding:8px;">
                  Raised Capital · Reental · Polygon · ${today}
                </div>
              </div>
            </body>
            </html>
            `;

            // Parse recipients
            const recipients = (process.env.RECIPIENTS || '').split(',').map(e => e.trim()).filter(Boolean).map(email => ({ email }));

            if (recipients.length === 0) {
              console.error('No recipients configured in REPORT_RECIPIENTS secret');
              process.exit(1);
            }

            // Send via Brevo
            const payload = JSON.stringify({
              sender: { name: 'Raised Capital', email: 'finanzas@reental.co' },
              to: recipients,
              subject: `📊 Raised Capital — ${new Date().toLocaleDateString('es-ES')} — ${fmt(totalCapital)}`,
              htmlContent: html,
            });

            await new Promise((resolve, reject) => {
              const options = {
                hostname: 'api.brevo.com',
                path: '/v3/smtp/email',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'api-key': BREVO_KEY,
                  'Content-Length': Buffer.byteLength(payload),
                },
              };
              const req = https.request(options, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    console.log('Email sent successfully!');
                    resolve();
                  } else {
                    console.error('Brevo error:', res.statusCode, data);
                    reject(new Error('Brevo API error: ' + res.statusCode));
                  }
                });
              });
              req.on('error', reject);
              req.write(payload);
              req.end();
            });
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF
